name: PoF-AI — CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION:     us-central1
  REPO:           pof-ai-repo
  WIF_PROVIDER:   ${{ secrets.WIF_PROVIDER }}    # Workload Identity Federation provider
  WIF_SA:         ${{ secrets.WIF_SA }}           # Service account email

jobs:
  # ── Backend Tests ─────────────────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pof-ai-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        env:
          GCP_PROJECT_ID:     test-project
          VERTEX_ENDPOINT_ID: test-endpoint
          API_KEY:            test-key
          GEMINI_API_KEY:     test-key
          KMS_KEY_CERT:       fake-kms-key
          KMS_KEY_LOG:        fake-kms-log-key
          GCS_BUCKET_EVIDENCE: test-bucket
          CERT_BASE_URL:      https://verify.pof-ai.app/cert
        run: pytest tests/ -v --tb=short

  # ── Log Service Tests ─────────────────────────────────────────────────────
  test-log:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pof-ai-log
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short || true   # optional — log tests may need GCS

  # ── Build & Deploy (main branch only) ────────────────────────────────────
  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [test-backend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account:            ${{ env.WIF_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      # Build & push backend
      - name: Build backend image
        run: |
          docker build -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REPO }}/pof-ai-backend:${{ github.sha }} \
                       -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REPO }}/pof-ai-backend:latest \
                       ./pof-ai-backend
          docker push --all-tags ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REPO }}/pof-ai-backend

      # Build & push log service
      - name: Build log service image
        run: |
          docker build -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REPO }}/pof-ai-log:${{ github.sha }} \
                       -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REPO }}/pof-ai-log:latest \
                       ./pof-ai-log
          docker push --all-tags ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REPO }}/pof-ai-log

      # Deploy backend to Cloud Run
      - name: Deploy backend
        run: |
          gcloud run deploy pof-ai-backend \
            --image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REPO }}/pof-ai-backend:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --no-allow-unauthenticated \
            --memory=2Gi --cpu=2

      # Deploy log service to Cloud Run
      - name: Deploy log service
        run: |
          gcloud run deploy pof-ai-log \
            --image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REPO }}/pof-ai-log:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --no-allow-unauthenticated \
            --memory=512Mi --cpu=1

      # Terraform apply
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Apply
        working-directory: infra
        run: |
          terraform apply -auto-approve \
            -var="project_id=${{ env.GCP_PROJECT_ID }}" \
            -var="region=${{ env.GCP_REGION }}" \
            -var="gemini_api_key=${{ secrets.GEMINI_API_KEY }}" \
            -var="api_key=${{ secrets.POF_AI_API_KEY }}" \
            -var="backend_image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REPO }}/pof-ai-backend:${{ github.sha }}" \
            -var="log_image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REPO }}/pof-ai-log:${{ github.sha }}"

      # Deploy frontend to Firebase
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: pof-ai-dashboard/package-lock.json

      - name: Build dashboard
        working-directory: pof-ai-dashboard
        run: |
          npm ci
          npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ env.GCP_PROJECT_ID }}
          channelId: live
          entryPoint: pof-ai-dashboard
